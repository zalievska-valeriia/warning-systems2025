const COLORS = ["#3d2b6b","#5b4b8a","#7b6caa","#a094c8","#c8bfe0"];

function fmt(v) {
  if (v >= 1e9) return 'UAH ' + (v/1e9).toFixed(2) + ' bn';
  if (v >= 1e6) return 'UAH ' + (v/1e6).toFixed(2) + ' mn';
  return 'UAH ' + (v/1000).toFixed(1) + ' th';
}

function render(year) {
  const items = DATA[year].items;
  const maxVal = items[0].value;
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  items.forEach((item, i) => {
    const pct = (item.value / maxVal) * 70;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <div class="bar-label">${item.name}</div>
      <div class="rank-badge">${i+1}</div>
      <div class="bar-wrap">
        <div class="bar" style="width:${pct}%;background:${COLORS[i]}">
          <span class="bar-val">${fmt(item.value)}</span>
        </div>
      </div>`;
    chart.appendChild(row);
    setTimeout(() => row.classList.add('visible'), 40 + i * 70);
  });
}

let active = '2024';
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;

});
