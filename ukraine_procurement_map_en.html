<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body { min-height:100vh; }
body {
  font-family:'Segoe UI',Arial,sans-serif;
  background:#fff;
  color:#1a1a2e;
  display:flex; flex-direction:column; align-items:center;
}

header { width:100%; padding:20px 32px 6px; text-align:center; }
header h1 {
  font-size:1.3rem; font-weight:700; color:#1a1a2e; letter-spacing:0.01em;
}

.btns { display:flex; gap:8px; margin:12px 0 6px; justify-content:center; flex-wrap:wrap; }
.btn {
  padding:7px 22px; border:1.5px solid #c0c0d0; background:transparent;
  color:#2b0f60; border-radius:6px; cursor:pointer; font-size:0.9rem; font-weight:600;
  transition:all .2s;
}
.btn:hover { border-color:#2b0f60; background:#f0ecf8; }
.btn.active { background:#2b0f60; border-color:#2b0f60; color:#fff; box-shadow:0 2px 10px rgba(43,15,96,.25); }

#stats {
  display:flex; gap:28px; justify-content:center; flex-wrap:wrap;
  padding:4px 16px 8px; font-size:0.78rem; color:#666;
}
.stat { text-align:center; }
.sv { color:#2b0f60; font-size:1.05rem; font-weight:700; display:block; }

#map-wrap { width:100%; max-width:960px; padding:0 10px; position:relative; }
#map { width:100%; height:520px; border-radius:10px; background:#f5f4f8; }
.leaflet-container { background:#f5f4f8 !important; }

/* Tooltip */
.leaflet-tooltip {
  background:rgba(255,255,255,.97) !important;
  border:1px solid #ddd !important;
  border-radius:8px !important; color:#1a1a2e !important;
  font-family:'Segoe UI',Arial,sans-serif !important;
  font-size:.82rem !important; padding:8px 12px !important;
  box-shadow:0 4px 16px rgba(0,0,0,.12) !important;
}
.leaflet-tooltip::before { display:none !important; }
.tn { font-weight:700; font-size:.93rem; color:#2b0f60; margin-bottom:4px; }
.tv { color:#fcad10; font-weight:700; }
.tnone { color:#aaa; font-style:italic; }
.tcrm { color:#888; font-style:italic; }
.trk { color:#999; font-size:.73rem; margin-top:2px; }

/* Info panel */
#panel {
  position:absolute; top:10px; right:10px; width:215px;
  background:#fff; border:1px solid #ddd; border-radius:10px;
  padding:14px; display:none; font-size:.82rem; z-index:1000;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
#panel h3 { color:#2b0f60; font-size:.95rem; margin-bottom:8px; font-weight:700; }
.pr { display:flex; justify-content:space-between; margin-bottom:5px; color:#555; }
.pv { color:#2b0f60; font-weight:700; }
.ptot { border-top:1px solid #eee; margin-top:6px; padding-top:6px; font-weight:600; }
.ptot .pv { color:#fcad10; }
.cx { position:absolute; top:8px; right:10px; cursor:pointer; color:#bbb; font-size:1.1rem; }
.cx:hover { color:#555; }

/* Legend */
.legend {
  background:rgba(255,255,255,.95) !important;
  padding:10px 12px; border-radius:8px;
  border:1px solid #ddd; font-size:.72rem; color:#555;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.leg-title { font-size:.74rem; color:#2b0f60; font-weight:700; margin-bottom:5px; }
#leg-bar { width:150px; height:10px; border-radius:3px; display:block; }
.leg-labels { display:flex; justify-content:space-between; width:150px; margin-top:3px; }

/* Footer */
footer {
  width:100%; padding:10px 20px 20px; text-align:center;
  font-size:0.72rem; color:#999; margin-top:6px;
}
footer a { color:#2b0f60; text-decoration:none; }
footer a:hover { text-decoration:underline; }
.footer-disclaimer { margin-bottom:14px; }
.footer-logos img { max-width:373px; width:90%; height:auto; opacity:0.9; }

/* Crimea hatching */
.crimea-pattern { }
</style>

function getColor(v, minV, maxV) {
  if (!v || v <= 0) return "#e0e0e0";
  const t = Math.max(0, Math.min(1,
    (Math.log(v) - Math.log(minV)) / (Math.log(maxV) - Math.log(minV))
  ));
  // Light warm #f7e8ff → deep purple #2b0f60
  const r = Math.round(247 - t*(247-43));
  const g = Math.round(232 - t*(232-15));
  const b = Math.round(255 - t*(255-96));
  return `rgb(${r},${g},${b})`;
}

// Init map
const map = L.map('map', {
  center: [49, 31.5], zoom: 6,
  zoomSnap: 0.5, attributionControl: false, zoomControl: true
});

// SVG defs for hatch pattern (Crimea)
const svgDefs = document.createElementNS('http://www.w3.org/2000/svg','svg');
svgDefs.setAttribute('width','0'); svgDefs.setAttribute('height','0');
svgDefs.style.position = 'absolute';
svgDefs.innerHTML = `<defs>
  <pattern id="crimea-hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#aaa" stroke-width="1.5"/>
  </pattern>
</defs>`;
document.body.appendChild(svgDefs);

let geoLayer = null;
let minV = 1, maxV = 1;

function buildLayer() {
  if (geoLayer) map.removeLayer(geoLayer);
  const dd = D[cur];
  // Global min/max across ALL years for consistent color scale
  const allVals = Object.values(D).flatMap(d => Object.values(d)).filter(v=>v>0);
  minV = Math.min(...allVals); maxV = Math.max(...allVals);

  geoLayer = L.geoJSON(GEO, {
    style: feat => {
      const name = feat.properties.name;
      const isCrimea = feat.properties.crimea;
      if (isCrimea) {
        return { fillColor:'#d0d0d0', fillOpacity:0.7, color:'#aaa', weight:1, dashArray:'4,3' };
      }
      const v = dd[name];
      return {
        fillColor: getColor(v, minV, maxV),
        fillOpacity: 0.9,
        color: '#bbb',
        weight: 0.8
      };
    },
    onEachFeature: (feat, layer) => {
      const name = feat.properties.name;
      const ua = UA[name] || name;
      const isCrimea = feat.properties.crimea;
      const v = dd[name];
      const sorted = Object.entries(dd).filter(([,x])=>x>0).sort((a,b)=>b[1]-a[1]);
      const rk = v ? sorted.findIndex(([k])=>k===name)+1 : null;

      let tipContent;
      if (isCrimea) {
        tipContent = `<div class="tn">${ua}</div><div class="tcrm">Temporarily occupied territory</div>`;
      } else {
        tipContent = `
          <div class="tn">${ua}</div>
          <div>${v ? `<span class="tv">${fmt(v)}</span>` : '<span class="tnone">No data</span>'}</div>
          ${rk ? `<div class="trk">#${rk} of ${sorted.length} regions</div>` : ''}
        `;
      }
      layer.bindTooltip(tipContent, { sticky: true });

      layer.on({
        mouseover: e => {
          if (!isCrimea) e.target.setStyle({ weight:2, color:'#2b0f60', fillOpacity:1 });
        },
        mouseout: e => { geoLayer.resetStyle(e.target); },
        click: () => { if (!isCrimea) openPanel(name); }
      });
    }
  }).addTo(map);

  updateLegend();
  updateStats();
}

// Legend
const legendCtrl = L.control({ position: 'bottomleft' });
legendCtrl.onAdd = () => {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = `
    <div class="leg-title">Contract amount</div>
    <canvas id="leg-bar" width="150" height="10"></canvas>
    <div class="leg-labels"><span id="lmin"></span><span id="lmax"></span></div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:7px">
      <div style="width:16px;height:10px;background:#e0e0e0;border:1px solid #ccc;border-radius:2px;flex-shrink:0"></div>
      <span>No data</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
      <div style="width:16px;height:10px;background:#d0d0d0;border:1px dashed #aaa;border-radius:2px;flex-shrink:0"></div>
      <span>Occupied territory</span>
    </div>
  `;
  return div;
};
legendCtrl.addTo(map);

function updateLegend() {
  const c = document.getElementById('leg-bar');
  if (!c) return;
  const ctx = c.getContext('2d');
  for (let i=0; i<150; i++) {
    const v = Math.exp(Math.log(minV) + i/150*(Math.log(maxV)-Math.log(minV)));
    ctx.fillStyle = getColor(v, minV, maxV);
    ctx.fillRect(i,0,1,10);
  }
  document.getElementById('lmin').textContent = fmtS(minV);
  document.getElementById('lmax').textContent = fmtS(maxV);
}

function updateStats() {
  const dd = D[cur];
  const ent = Object.entries(dd).filter(([,v])=>v>0);
  const tot = ent.reduce((s,[,v])=>s+v,0);
  const top = [...ent].sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="sv">${fmt(tot)}</span>total amount</div>
    <div class="stat"><span class="sv">${top?(UA[top[0]]||top[0]):'—'}</span>${top?'leader ('+fmt(top[1])+')':''}</div>
  `;
}

function openPanel(name) {
  sel = name;
  document.getElementById('pname').textContent = UA[name]||name;
  const rows = YEARS.map(y=>`<div class="pr"><span>${y}</span><span class="pv">${fmt(D[y][name])}</span></div>`);
  const tot = YEARS.reduce((s,y)=>s+(D[y][name]||0),0);
  rows.push(`<div class="pr ptot"><span>Total</span><span class="pv">${fmt(tot)}</span></div>`);
  document.getElementById('prows').innerHTML = rows.join('');
  document.getElementById('panel').style.display = 'block';
}

document.getElementById('cx').onclick = () => {
  document.getElementById('panel').style.display = 'none';
  sel = null;
};

// Year buttons
const bw = document.getElementById('btns');
[...YEARS,'Total'].forEach(y=>{
  const b = document.createElement('button');
  b.className = 'btn'+(y===cur?' active':'');
  b.textContent = y;
  b.onclick = () => {
    cur = y;
    document.querySelectorAll('.btn').forEach(b=>b.classList.toggle('active',b.textContent===y));
    document.getElementById('panel').style.display = 'none';
    buildLayer();
  };
  bw.appendChild(b);
});

map.fitBounds([[44.3, 22.0],[52.4, 40.3]]);
buildLayer();
</script>
</body>
</html>
